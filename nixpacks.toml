# nixpacks.toml
# Explicitly defining the environment for Railway to ensure all PHP extensions are present.

[phases.setup]
nixPkgs = [
    'php82',
    'php82Packages.composer',
    'gd',
    'bcmath',
    'zlib',
    'pkg-config',
    'libzip'
]

[phases.install]
# We tell Nixpacks specifically which extensions to enable during the build process
cmds = [
    'composer install --optimize-autoloader --no-interaction --no-progress --ignore-platform-req=ext-gd --ignore-platform-req=ext-bcmath'
]

[phases.build]
cmds = [
    'php artisan optimize'
]

[variables]
NIXPACKS_PHP_EXTENSIONS = 'gd,bcmath,pdo_mysql,mbstring,xml,tokenizer,ctype,curl,zip,intl'
PHP_VERSION = '8.2'