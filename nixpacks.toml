# nixpacks.toml for BondKonnect Backend
# This configuration ensures PHP 8.2 and all required extensions are installed correctly on Railway.

[phases.setup]
nixPkgs = [
    'php83',
    'php83Packages.composer',
    'php83Extensions.zip',
    'php83Extensions.gd',
    'php83Extensions.bcmath',
    'php83Extensions.intl',
    'php83Extensions.pdo_pgsql',
    'php83Extensions.mbstring',
    'php83Extensions.xml',
    'php83Extensions.curl',
    'php83Extensions.ctype',
    'php83Extensions.tokenizer',
    'php83Extensions.dom',
    'php83Extensions.fileinfo'
]

[phases.install]
cmds = [
    'composer install --optimize-autoloader --no-interaction --no-progress'
]

[phases.build]
cmds = [
    'php artisan optimize'
]

[variables]
PHP_VERSION = '8.3'
NIXPACKS_PHP_EXTENSIONS = 'zip,gd,bcmath,zip,intl,pdo_pgsql,mbstring,xml,curl,ctype,tokenizer,dom,fileinfo'
